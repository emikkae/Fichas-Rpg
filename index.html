<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fichas RPG</title>

<style>

body{
background:#0b0b0f;
color:#e6eef3;
font-family:Arial;
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#111;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

input,button,textarea{
width:100%;
padding:10px;
margin-top:5px;
background:#0f0f14;
color:white;
border:1px solid #333;
border-radius:6px;
}

button{
cursor:pointer;
}

.ficha{
display:flex;
justify-content:space-between;
background:#0f0f14;
padding:10px;
margin-top:8px;
border-radius:6px;
}

.actions{
display:flex;
gap:5px;
flex-wrap:wrap;
}

textarea{
height:250px;
font-family:monospace;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<h2>Fichas RPG</h2>

<div class="card">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button id="login">Entrar</button>
<button id="signup">Cadastrar</button>
<button id="reset">Esqueci senha</button>
<button id="logout" class="hidden">Sair</button>

<p id="status">Não conectado</p>

</div>

<div id="painel" class="card hidden">

<input id="nomeFicha" placeholder="Nome da ficha">

<button id="criarFicha">CRIAR NOVA FICHA</button>

<h3>Suas fichas</h3>

<div id="listaFichas"></div>

</div>

<div id="editor" class="card hidden">

<h3>Editar ficha</h3>

<input id="editNome">

<textarea id="editHtml"></textarea>

<button id="salvar">Salvar</button>
<button id="preview">Abrir</button>
<button id="duplicar">Duplicar</button>
<button id="apagar">Apagar</button>
<button id="fechar">Fechar</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
sendPasswordResetEmail,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
onSnapshot,
doc,
updateDoc,
deleteDoc
}
from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyBFm18hEqWFW6jgnu4CYp-E9_sL7YeC3wA",

authDomain: "fichas-rpg00.firebaseapp.com",

projectId: "fichas-rpg00",

storageBucket: "fichas-rpg00.firebasestorage.app",

messagingSenderId: "569182509691",

appId: "1:569182509691:web:13f5d9e242c309b0bda0de"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const status = document.getElementById("status");

const painel = document.getElementById("painel");

const logout = document.getElementById("logout");

let usuario=null;

let fichaAtual=null;

function msg(t,e=false){

status.textContent=t;

status.style.color=e?"#ff6b6b":"white";

}

document.getElementById("signup").onclick=async()=>{

try{

await createUserWithEmailAndPassword(auth,email.value,password.value);

}catch(e){msg(e.message,true)}

};

document.getElementById("login").onclick=async()=>{

try{

await signInWithEmailAndPassword(auth,email.value,password.value);

}catch(e){msg(e.message,true)}

};

document.getElementById("reset").onclick=async()=>{

try{

await sendPasswordResetEmail(auth,email.value);

msg("Email enviado");

}catch(e){msg(e.message,true)}

};

logout.onclick=()=>signOut(auth);

onAuthStateChanged(auth,u=>{

usuario=u;

if(u){

msg("Conectado como "+u.email);

logout.classList.remove("hidden");

painel.classList.remove("hidden");

carregarFichas();

}else{

msg("Não conectado");

logout.classList.add("hidden");

painel.classList.add("hidden");

}

});

async function carregarFichas(){

const q=query(collection(db,"fichas"),where("owner","==",usuario.uid));

onSnapshot(q,snap=>{

listaFichas.innerHTML="";

snap.forEach(d=>{

const data=d.data();

const div=document.createElement("div");

div.className="ficha";

div.innerHTML=`<b>${data.nome}</b>`;

const a=document.createElement("div");

a.className="actions";

const abrir=document.createElement("button");

abrir.textContent="Abrir";

abrir.onclick=()=>abrirFicha(data.html,d.id);

const editar=document.createElement("button");

editar.textContent="Editar";

editar.onclick=()=>editarFicha(data,d.id);

const apagar=document.createElement("button");

apagar.textContent="Apagar";

apagar.onclick=()=>deleteDoc(doc(db,"fichas",d.id));

a.appendChild(abrir);

a.appendChild(editar);

a.appendChild(apagar);

div.appendChild(a);

listaFichas.appendChild(div);

});

});

}

function abrirFicha(html,id){

const blob=new Blob([html],{type:"text/html"});

const url=URL.createObjectURL(blob);

window.open(url,"_blank");

}

async function editarFicha(data,id){

editor.classList.remove("hidden");

editNome.value=data.nome;

editHtml.value=data.html;

fichaAtual=id;

}

salvar.onclick=async()=>{

await updateDoc(doc(db,"fichas",fichaAtual),{

nome:editNome.value,

html:editHtml.value

});

};

preview.onclick=()=>abrirFicha(editHtml.value,fichaAtual);

duplicar.onclick=async()=>{

await addDoc(collection(db,"fichas"),{

nome:editNome.value+" copia",

html:editHtml.value,

owner:usuario.uid,

createdAt:new Date().toISOString()

});

};

apagar.onclick=async()=>{

await deleteDoc(doc(db,"fichas",fichaAtual));

editor.classList.add("hidden");

};

fechar.onclick=()=>editor.classList.add("hidden");

criarFicha.onclick=async()=>{

let html="";

try{

const r=await fetch("./ficha_base.html");

html=await r.text();

}catch(e){

html="<h1>Nova ficha</h1>";

}

await addDoc(collection(db,"fichas"),{

nome:nomeFicha.value||"Nova ficha",

html:html,

owner:usuario.uid,

createdAt:new Date().toISOString()

});

};

</script>

</body>
</html>
