<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fichas RPG</title>

<style>

body{
background:#0b0b0f;
color:#e6eef3;
font-family:Arial;
padding:15px;
max-width:900px;
margin:auto;
}

.card{
background:#111;
padding:15px;
border-radius:8px;
margin-top:15px;
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
background:#0f0f14;
border:1px solid #333;
color:white;
border-radius:6px;
}

button{
cursor:pointer;
}

.ficha{
display:flex;
justify-content:space-between;
margin-top:8px;
background:#0f0f14;
padding:8px;
border-radius:6px;
}

.actions button{
width:auto;
margin-left:4px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<h2>Fichas RPG</h2>

<div class="card" id="loginCard">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button id="btnLogin">Entrar</button>
<button id="btnSignUp">Cadastrar</button>
<button id="btnReset">Esqueci senha</button>

<p id="status">Não conectado</p>

</div>

<div class="card hidden" id="painel">

<p id="userEmail"></p>

<button id="btnLogout">Sair</button>

<hr>

<input id="newName" placeholder="Nome da ficha">

<button id="btnCreate">CRIAR NOVA FICHA</button>

<h3>Minhas fichas</h3>

<div id="fichasList"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBFm18hEqWFW6jgnu4CYp-E9_sL7YeC3wA",
authDomain: "fichas-rpg00.firebaseapp.com",
projectId: "fichas-rpg00",
storageBucket: "fichas-rpg00.firebasestorage.app",
messagingSenderId: "569182509691",
appId: "1:569182509691:web:13f5d9e242c309b0bda0de"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const status = document.getElementById("status");

const btnLogin = document.getElementById("btnLogin");
const btnSignUp = document.getElementById("btnSignUp");
const btnReset = document.getElementById("btnReset");
const btnLogout = document.getElementById("btnLogout");

const painel = document.getElementById("painel");
const userEmail = document.getElementById("userEmail");

const btnCreate = document.getElementById("btnCreate");
const newName = document.getElementById("newName");

const fichasList = document.getElementById("fichasList");

let currentUser=null;
let unsubscribe=null;

function setStatus(msg,err=false){
status.textContent=msg;
status.style.color=err?"#ff6b6b":"white";
}

/* AUTH */

btnSignUp.onclick=async()=>{
try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
}catch(e){
setStatus(e.message,true);
}
};

btnLogin.onclick=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch(e){
setStatus(e.message,true);
}
};

btnReset.onclick=async()=>{
try{
await sendPasswordResetEmail(auth,email.value);
setStatus("Email enviado");
}catch(e){
setStatus(e.message,true);
}
};

btnLogout.onclick=async()=>{
await signOut(auth);
};

/* LOGIN STATE */

onAuthStateChanged(auth,user=>{

currentUser=user;

if(user){

painel.classList.remove("hidden");
userEmail.textContent="Logado: "+user.email;
setStatus("Conectado");

loadFichas();

}else{

painel.classList.add("hidden");
userEmail.textContent="";
setStatus("Não conectado");

if(unsubscribe)unsubscribe();

}

});

/* CRIAR FICHA */

btnCreate.onclick=async()=>{

if(!currentUser){
alert("Faça login");
return;
}

let nome=newName.value||"Nova ficha";

let html="";

try{
const res=await fetch("./ficha_base.html");
if(res.ok)html=await res.text();
}catch(e){}

if(!html){

html=`
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>${nome}</title>
</head>
<body>
<h1>${nome}</h1>
</body>
</html>
`;

}

const docRef=await addDoc(collection(db,"fichas"),{
name:nome,
html:html,
owner:currentUser.uid,
createdAt:new Date().toISOString()
});

openFicha(html,docRef.id);

newName.value="";

};

/* ABRIR FICHA */

function openFicha(html,id){

const blob=new Blob([html],{type:"text/html"});
const url=URL.createObjectURL(blob);

window.open(url,"_blank");

}

/* LISTAR FICHAS */

function loadFichas(){

const q=query(
collection(db,"fichas"),
where("owner","==",currentUser.uid)
);

unsubscribe=onSnapshot(q,snap=>{

fichasList.innerHTML="";

snap.forEach(docu=>{

const data=docu.data();

const div=document.createElement("div");
div.className="ficha";

const title=document.createElement("span");
title.textContent=data.name||"Sem nome";

const actions=document.createElement("div");
actions.className="actions";

const open=document.createElement("button");
open.textContent="Abrir";
open.onclick=()=>openFicha(data.html,docu.id);

const del=document.createElement("button");
del.textContent="Apagar";
del.onclick=async()=>{

if(confirm("Apagar ficha?")){
await deleteDoc(doc(db,"fichas",docu.id));
}

};

actions.appendChild(open);
actions.appendChild(del);

div.appendChild(title);
div.appendChild(actions);

fichasList.appendChild(div);

});

});

}

</script>

</body>
</html>
