<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fichas RPG</title>

<style>

body{
background:#0b0b0f;
color:white;
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
background:#111;
color:white;
border:1px solid #333;
border-radius:6px;
}

button{
cursor:pointer;
}

.section{
margin-top:25px;
background:#111;
padding:15px;
border-radius:8px;
}

.ficha{
display:flex;
justify-content:space-between;
margin-top:10px;
padding:8px;
background:#0f0f14;
border-radius:6px;
}

</style>
</head>

<body>

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button id="login">Entrar</button>
<button id="signup">Cadastrar</button>
<button id="reset">Esqueci senha</button>
<button id="logout" style="display:none">Sair</button>

<p id="status">Não conectado</p>

<div class="section">

<h2>Painel</h2>

<button id="createFicha">CRIAR NOVA FICHA</button>
<button id="manageFicha">GERENCIAR FICHAS</button>

<div id="lista" style="display:none">
<h3>Minhas fichas</h3>
<div id="fichas"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword,
signInWithEmailAndPassword,
signOut,
sendPasswordResetEmail,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
onSnapshot,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";


const firebaseConfig = {
    apiKey: "AIzaSyBFm18hEqWFW6jgnu4CYp-E9_sL7YeC3wA",
    authDomain: "fichas-rpg00.firebaseapp.com",
    projectId: "fichas-rpg00",
    storageBucket: "fichas-rpg00.firebasestorage.app",
    messagingSenderId: "569182509691",
    appId: "1:569182509691:web:13f5d9e242c309b0bda0de"
  };


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);


const email = document.getElementById("email");
const password = document.getElementById("password");
const status = document.getElementById("status");
const logoutBtn = document.getElementById("logout");

const lista = document.getElementById("lista");
const fichasDiv = document.getElementById("fichas");

let user = null;
let unsubscribe = null;


function setStatus(msg,err=false){
status.textContent = msg;
status.style.color = err ? "#ff6b6b":"white";
}


/* LOGIN */

document.getElementById("signup").onclick = async ()=>{

try{
await createUserWithEmailAndPassword(auth,email.value,password.value);
}catch(e){
setStatus(e.message,true);
}

};


document.getElementById("login").onclick = async ()=>{

try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch(e){
setStatus(e.message,true);
}

};


document.getElementById("reset").onclick = async ()=>{

try{
await sendPasswordResetEmail(auth,email.value);
setStatus("Email enviado");
}catch(e){
setStatus(e.message,true);
}

};


logoutBtn.onclick = async ()=>{
await signOut(auth);
};


/* ESTADO LOGIN */

onAuthStateChanged(auth,u=>{

user = u;

if(u){

setStatus("Logado: "+u.email);
logoutBtn.style.display="block";

}else{

setStatus("Não conectado");
logoutBtn.style.display="none";
lista.style.display="none";

if(unsubscribe) unsubscribe();

}

});


/* CRIAR FICHA */

document.getElementById("createFicha").onclick = async ()=>{

if(!user){
alert("Faça login primeiro");
return;
}

let html="";

try{

const res = await fetch("/ficha_base.html");

if(res.ok)
html = await res.text();

}catch(e){}

if(!html){

html = `
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Ficha</title>
</head>
<body>
<h1>Nova ficha</h1>
</body>
</html>
`;

}


const docRef = await addDoc(collection(db,"fichas"),{

owner:user.uid,
html:html,
createdAt:new Date().toISOString()

});


const blob = new Blob([html],{type:"text/html"});
const url = URL.createObjectURL(blob);

/* ENVIA ID DA FICHA */
window.open(url+"#"+docRef.id,"_blank");

};


/* GERENCIAR */

document.getElementById("manageFicha").onclick = ()=>{

if(!user){
alert("Faça login");
return;
}

lista.style.display="block";

const q = query(
collection(db,"fichas"),
where("owner","==",user.uid)
);

unsubscribe = onSnapshot(q,snap=>{

fichasDiv.innerHTML="";

snap.forEach(docu=>{

const data = docu.data();

const div = document.createElement("div");
div.className="ficha";

const open = document.createElement("button");
open.textContent="Abrir";

open.onclick=()=>{

const blob = new Blob([data.html],{type:"text/html"});
const url = URL.createObjectURL(blob);

window.open(url+"#"+docu.id,"_blank");

};

const del = document.createElement("button");
del.textContent="Apagar";

del.onclick=async ()=>{

if(confirm("Apagar ficha?")){
await deleteDoc(doc(db,"fichas",docu.id));
}

};

div.appendChild(open);
div.appendChild(del);

fichasDiv.appendChild(div);

});

});

};

</script>
</body>
</html>
