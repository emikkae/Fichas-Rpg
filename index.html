<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fichas RPG</title>

  <style>
    body {
      background:#0b0b0f;
      color:#e6eef3;
      font-family:Arial, sans-serif;
      padding:20px;
      max-width:800px;
      margin:auto;
    }

    input, button {
      padding:10px;
      margin:5px 0;
      width:100%;
      background:#111;
      color:white;
      border:1px solid #333;
      border-radius:6px;
    }

    button {
      cursor:pointer;
    }

    .section {
      margin-top:25px;
      padding:15px;
      background:#111;
      border-radius:8px;
    }

    .ficha-item {
      display:flex;
      justify-content:space-between;
      margin-top:8px;
      background:#0f0f14;
      padding:8px;
      border-radius:6px;
    }
  </style>
</head>
<body>

<h2>Login</h2>

<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">

<button id="btnLogin">Entrar</button>
<button id="btnSignUp">Cadastrar</button>
<button id="btnReset">Esqueci senha</button>
<button id="btnLogout" style="display:none;">Sair</button>

<p id="status">Não conectado</p>

<div class="section">
  <h2>Painel</h2>
  <button id="btnCreate">CRIAR NOVA FICHA</button>
  <button id="btnManage">GERENCIAR FICHAS CRIADAS</button>

  <div id="fichasArea" style="display:none;">
    <h3>Minhas Fichas</h3>
    <div id="fichasList"></div>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.6.0/firebase-firestore.js";

/* COLE AQUI SUA CONFIG DO FIREBASE */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "SEU_SENDER_ID",
  appId: "SEU_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const email = document.getElementById("email");
const password = document.getElementById("password");
const status = document.getElementById("status");
const btnLogout = document.getElementById("btnLogout");
const fichasArea = document.getElementById("fichasArea");
const fichasList = document.getElementById("fichasList");

let currentUser = null;
let unsubscribe = null;

function setStatus(msg, error=false){
  status.textContent = msg;
  status.style.color = error ? "#ff6b6b" : "white";
}

document.getElementById("btnSignUp").onclick = async () => {
  try {
    await createUserWithEmailAndPassword(auth, email.value, password.value);
  } catch(e){
    setStatus(e.message, true);
  }
};

document.getElementById("btnLogin").onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch(e){
    setStatus(e.message, true);
  }
};

document.getElementById("btnReset").onclick = async () => {
  try {
    await sendPasswordResetEmail(auth, email.value);
    setStatus("Email enviado");
  } catch(e){
    setStatus(e.message, true);
  }
};

btnLogout.onclick = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  currentUser = user;

  if(user){
    setStatus("Conectado como " + user.email);
    btnLogout.style.display = "block";
  } else {
    setStatus("Não conectado");
    btnLogout.style.display = "none";
    fichasArea.style.display = "none";
    if(unsubscribe) unsubscribe();
  }
});

/* GARANTE CAMPO DE ANOTAÇÕES */
function ensureNotes(html){
  if(html.includes('id="notas"')) return html;
  return html.replace("</body>", `
    <div style="margin-top:20px;">
      <h3>Anotações</h3>
      <textarea id="notas" style="width:100%;height:200px;"></textarea>
    </div>
  </body>`);
}

/* CRIAR NOVA FICHA */
document.getElementById("btnCreate").onclick = async () => {
  if(!currentUser){
    alert("Faça login primeiro");
    return;
  }

  let html = "";

  try {
    const res = await fetch("/ficha_base.html");
    if(res.ok){
      html = await res.text();
    }
  } catch(e){}

  if(!html){
    html = `
    <!doctype html>
    <html>
    <head><meta charset="utf-8"><title>Nova Ficha</title></head>
    <body>
      <h1>Nova Ficha</h1>
      <p>Conteúdo base</p>
    </body>
    </html>`;
  }

  html = ensureNotes(html);

  await addDoc(collection(db,"fichas"),{
    owner: currentUser.uid,
    html: html,
    createdAt: new Date().toISOString()
  });

  const blob = new Blob([html],{type:"text/html"});
  const url = URL.createObjectURL(blob);
  window.open(url,"_blank");
};

/* GERENCIAR FICHAS */
document.getElementById("btnManage").onclick = () => {

  if(!currentUser){
    alert("Faça login primeiro");
    return;
  }

  fichasArea.style.display = "block";

  const q = query(collection(db,"fichas"), where("owner","==",currentUser.uid));

  unsubscribe = onSnapshot(q, snap => {
    fichasList.innerHTML = "";

    snap.forEach(docu => {
      const data = docu.data();

      const div = document.createElement("div");
      div.className = "ficha-item";

      const openBtn = document.createElement("button");
      openBtn.textContent = "Abrir";
      openBtn.onclick = () => {
        const blob = new Blob([data.html],{type:"text/html"});
        const url = URL.createObjectURL(blob);
        window.open(url,"_blank");
      };

      const delBtn = document.createElement("button");
      delBtn.textContent = "Apagar";
      delBtn.onclick = async () => {
        if(confirm("Apagar ficha?")){
          await deleteDoc(doc(db,"fichas",docu.id));
        }
      };

      div.appendChild(openBtn);
      div.appendChild(delBtn);
      fichasList.appendChild(div);
    });
  });
};

</script>
</body>
</html>
